{% extends "base.html" %}
{% block title %}Log In - SSL Hour Logger{% endblock %}
{% block content %}
<div class="card" style="max-width:400px; margin:0 auto;">
    <h2>Log In</h2>
    <form method="post">
        {% csrf_token %}
        <table style="width:100%;">
            {% for field in form %}
            <tr>
                <td style="padding:8px 0; font-weight:bold; width:120px;">{{ field.label_tag }}</td>
                <td style="padding:8px 0;">{{ field }}</td>
            </tr>
            {% endfor %}
        </table>
        {% if form.errors %}
        <p style="color:#e74c3c; margin-top:8px;">Invalid username or password.</p>
        {% endif %}
        <br>
        <button type="submit" class="btn">Log In</button>
    </form>
</div>
{% endblock %}
